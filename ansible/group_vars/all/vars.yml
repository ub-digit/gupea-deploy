---
docker_git_repo_url: https://github.com/ub-digit/gupea-deploy.git
docker_directory: './docker' # Default is './docker'
app_name: gupea

data_dir: /data/gupea
data_dirs:
  postgres:
    path: /data/gupea/postgres-data
    owner: 999
    group: 999
    mode: '0750'
    pull: false
    push: false
  solr:
    path: /data/gupea/solr-data
    owner: 8983
    group: 8983
    mode: '0750'
    pull: true
    push: true
  dspace_sitemaps:
    path: /data/gupea/sitemaps
    owner: root
    group: root
    mode: '0750'
    pull: true
    push: true
  dspace_asset_store:
    path: /data/gupea/dspace-asset-store
    owner: root
    group: root
    mode: '0750'
    pull: false
    push: false
  dspace_logs:
    path: /data/gupea/dspace-logs
    owner: root
    group: root
    mode: '0750'
    pull: true
    push: true

gupea_dflow_import_data_dir: /data/gupea/dflow-import-data
# Assume gupea_dflow_import already exists on the host
# In production is mounted by sshfs and ownership and mode can't be choosen
